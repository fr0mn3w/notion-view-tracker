# Social Metrics to Notion - live config (v1: X / Twitter only).
# No secrets here. Tokens come from env / GitHub Actions Secrets, named below.
#
# Hero metric: impressions / views. On X this is impression_count (X's "Views"),
# written to the "Impressions or Reach" column. Foreground that column in the dashboard.

notion:
  database_id: "3736e03f5eaa80d3b965fce6ccf8f225"

x:
  window_days: 7
  provisional_days: 2
  max_posts: 100

  accounts:
    - handle: "newsystems_"
      access_token_env: "X_NEWSYSTEMS_ACCESS_TOKEN"
      refresh_token_env: "X_NEWSYSTEMS_REFRESH_TOKEN"
    - handle: "otherstuffpod"
      access_token_env: "X_OTHERSTUFFPOD_ACCESS_TOKEN"
      refresh_token_env: "X_OTHERSTUFFPOD_REFRESH_TOKEN"

# v2: YouTube. Fill channel_id once provided. Tokens live in GitHub Secrets.
youtube:
  trailing_days: 3
  provisional_days: 3
  channels:
    - handle: "newsystems"
      channel_id: "REPLACE_WITH_NEWSYSTEMS_CHANNEL_ID"
      access_token_env: "YT_NEWSYSTEMS_ACCESS_TOKEN"
      refresh_token_env: "YT_NEWSYSTEMS_REFRESH_TOKEN"
    - handle: "otherstuff"
      channel_id: "UC5neeg2k9Hm3pC2y9jKlOjg"
      access_token_env: "YT_OTHERSTUFF_ACCESS_TOKEN"
      refresh_token_env: "YT_OTHERSTUFF_REFRESH_TOKEN"
